<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="/static/images/logo-transparent.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crescent Clinic and Scans — Login</title>
    <meta name="description" content="Crescent Clinic and Scans System — Premium Healthcare & Diagnostics.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=32">
    <style>
        .mobile-menu-toggle {
            display: none !important;
        }

        @media (max-width: 900px) {
            .split-login-body {
                overflow-y: auto !important;
                height: auto !important;
                min-height: 100vh !important;
            }

            .split-login-container {
                height: auto !important;
                min-height: 100vh !important;
                overflow-y: visible !important;
            }

            .split-form-side {
                min-height: 100vh !important;
                justify-content: space-between !important;
                padding: 30px 20px 20px 20px !important;
            }
        }
    </style>
<meta name="csrf-token" content="{{ csrf_token }}">
</head>

<body class="split-login-body">
    <div class="split-login-container">
        <!-- Left Side: Branding -->
        <div class="split-image-side">
            <div class="side-image-content"></div>
        </div>

        <!-- Right Side: Interaction Area -->
        <div class="split-form-side">
            <!-- Login Form Screen -->
            <div id="loginScreen" class="split-overlay-content active-view">
                <div class="login-header-v2">
                    <div class="role-logo">
                        <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Clinic Logo"
                            class="clinic-logo-img">
                    </div>
                    <h2 id="loginTitle" class="role-title">Crescent Clinic and Scans</h2>
                    <p id="loginSubtitle" class="role-subtitle">Sign in to access your dashboard</p>
                </div>

                {% if error %}
                <div class="alert alert-error">
                    {{ error }}
                </div>
                {% endif %}

                <form class="premium-form-v2" method="POST" action="/login">
                    <div class="form-group v2-input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required autocomplete="off"
                            placeholder="Enter username">
                    </div>
                    <div class="form-group v2-input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn-premium-action btn-full">
                        <span>Sign In</span>
                    </button>
                </form>
            </div>
            <!-- Footer Link -->
            <div style="margin-top: auto; padding-top: 30px; text-align: center; padding-bottom: 10px;">
                <a href="/portfolio"
                    style="color: #64748b; text-decoration: none; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.5px; transition: color 0.3s;"
                    onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">@ nnp.com</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script_app.js') }}?v=31"></script>
</body>

</html>
